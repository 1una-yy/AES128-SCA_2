<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCA 系統流程圖</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f4;--border:#e0e2ea;--border2:#c8ccd8;
  --text:#1a1d2e;--muted:#7a7f9a;
  --blue:#3b6ff0;--blue-bg:#eff3ff;--blue-bd:#c5d3fa;--blue-dk:#1e3fa8;
  --green:#0e9e63;--green-bg:#edfaf4;--green-bd:#b6e8d0;--green-dk:#0a6b42;
  --orange:#e08010;--orange-bg:#fff8ed;--orange-bd:#fad6a0;--orange-dk:#8a4e00;
  --red:#dc2626;--red-bg:#fee2e2;--red-bd:#fca5a5;
  --gray:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:36px 36px;opacity:.4;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 24px 60px}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;border:1.5px solid var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-text strong{font-size:14px;font-weight:700;display:block}
.logo-text span{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.nav-links{display:flex;gap:8px}
.nav-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:6px;text-decoration:none}
.nav-link:hover{background:var(--surface2)}

/* Tabs */
.tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:20px;overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;user-select:none;white-space:nowrap}
.tab:hover{background:var(--surface2)}
.tab.active{background:var(--blue-bg);color:var(--blue-dk)}
.tab-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--surface2)}
.tab.active .tab-icon{background:var(--blue);color:#fff}
.tab-div{width:1px;height:24px;background:var(--border);flex-shrink:0;margin:0 2px;align-self:center}

/* Diagram panels */
.diagram-panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.diagram-panel.active{display:block}
.diagram-hd{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:10px}
.diagram-dot{width:7px;height:7px;border-radius:50%}
.diagram-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.diagram-body{padding:28px;overflow-x:auto}
svg{font-family:'IBM Plex Mono',monospace;overflow:visible}
</style>
</head>

    <a href="playground.html" class="nav-link">⚗ 實驗室</a>

</header>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)"><div class="tab-icon">⬡</div>系統架構圖</div>
  <div class="tab-div"></div>
  <div class="tab" onclick="showTab(1)"><div class="tab-icon">↓</div>使用者操作流程</div>
  <div class="tab-div"></div>
  <div class="tab" onclick="showTab(2)"><div class="tab-icon">⇄</div>API 時序圖</div>
  <div class="tab-div"></div>
  <div class="tab" onclick="showTab(3)"><div class="tab-icon">≡</div>演算法比較</div>
</div>
